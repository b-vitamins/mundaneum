version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: folio-db
    environment:
      POSTGRES_USER: folio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-folio}
      POSTGRES_DB: folio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U folio" ]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.6
    container_name: folio-search
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    volumes:
      - meili_data:/meili_data
    ports:
      - "${MEILI_PORT:-7700}:7700"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: docker.io/minio/minio:latest
    container_name: folio-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-folio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-foliopass}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: folio-api
    environment:
      DATABASE_URL: postgresql://folio:${POSTGRES_PASSWORD:-folio}@postgres:5432/folio
      MEILI_URL: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_MASTER_KEY:-}
      MINIO_URL: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-folio}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-foliopass}
      BIB_DIRECTORY: /data
      S2_CORPUS_PATH: /data/s2/corpus.duckdb
    volumes:
      - ${BIB_DIRECTORY:-./data}:/data:ro
      - ${S2_DATA_DIR:-/data/s2}:/data/s2:ro
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: folio-ui
    ports:
      - "${UI_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  meili_data:
  minio_data:
